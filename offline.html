<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#030617" />
    <title>Offline • Automations</title>
    <style>
      body {
        margin: 0;
        font-family: "Inter", system-ui, -apple-system, sans-serif;
        background: #030617;
        color: #e2e8f0;
        display: grid;
        min-height: 100vh;
        place-items: center;
        text-align: center;
      }
      main {
        max-width: 420px;
        padding: 24px;
      }
      h1 {
        font-size: 1.75rem;
        margin-bottom: 0.5rem;
      }
      p {
        color: #94a3b8;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>You are offline</h1>
      <p>
        The app is still available, but this page requires a network connection.
        Please reconnect and try again.
      </p>
    </main>
  </body>
</html>
